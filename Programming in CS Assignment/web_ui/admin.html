<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - EduCore</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .portal-container { max-width: 900px; background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 24px; padding: 2.5rem; margin: 2rem auto; width: 90%; position: relative; z-index: 1; animation: fadeInUp 0.8s ease-out forwards; }
        .portal-header { margin-bottom: 2.5rem; text-align: left; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .portal-header-left { display: flex; align-items: center; gap: 1rem; }
        .portal-header .icon { width: 65px; height: 65px; font-size: 2.2rem; margin: 0; background: rgba(99, 102, 241, 0.2); border-color: rgba(99, 102, 241, 0.5); transform: none !important; }
        .portal-header h1 { font-size: 2.2rem; background: none; -webkit-text-fill-color: var(--text-color); margin: 0; }
        .back-link { color: var(--primary-light); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem; transition: transform 0.2s; }
        .back-link:hover { transform: translateX(-5px); }
        .grid-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        @media (max-width: 768px) { .grid-cards { grid-template-columns: 1fr; } }
        .task-card { background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); transition: background 0.3s, transform 0.3s; }
        .task-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-5px); }
        .task-card h3 { margin-bottom: 0.8rem; font-size: 1.2rem; font-weight: 600; }
        .task-card p { color: #cbd5e1; font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.5; }
        .btn { display: inline-block; padding: 0.8rem 1.5rem; background: var(--primary); border: none; border-radius: 12px; color: white; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: background 0.3s, transform 0.2s; text-decoration: none; }
        .btn:hover { background: var(--primary-light); transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="background" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="portal-container">
        <header class="portal-header">
            <div class="portal-header-left">
                <div class="icon">🛡️</div>
                <h1>Admin Portal</h1>
            </div>
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </header>

        <div class="grid-cards">
            <!-- Employee Management -->
            <div class="task-card">
                <h3>👥 Employee Management</h3>
                <p>Manage school staff and roles.</p>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem;">
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="promptAddEmployee()">Add</button>
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="promptRemoveEmployee()">Remove</button>
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="promptUpdateEmployee()">Update</button>
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="fetchTeachers()">View Details</button>
                </div>
            </div>

            <!-- Student Management -->
            <div class="task-card">
                <h3>🎓 Student Management</h3>
                <p>Add, remove, and view student records.</p>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem;">
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="promptAddStudent()">Add</button>
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="promptRemoveStudent()">Remove</button>
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="promptUpdateStudent()">Update</button>
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="fetchStudents()">View Details</button>
                </div>
            </div>

            <!-- Class & Schedule Management -->
            <div class="task-card">
                <h3>🗓 Class & Schedule Management</h3>
                <p>Classes, attendance, and statistics.</p>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem;">
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="promptClassScheduling()">Class Scheduling</button>
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="fetchReports()">Generate Attendance Report</button>
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="fetchStats()">Statistical Insights</button>
                </div>
            </div>
            
            <!-- Overall Reports (Main Menu 4 & 5) -->
            <div class="task-card">
                <h3>📊 System Reports</h3>
                <p>Quick access to main menu reports.</p>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem;">
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="fetchReports()">View Attendance Report</button>
                    <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="fetchStats()">View Statistical Insights</button>
                </div>
            </div>
        </div>
        
        <!-- Interactive Code for Python Flask Integration -->
        <div id="results-container" style="margin-top: 2rem; display: none; background: rgba(0,0,0,0.25); padding: 1.5rem; border-radius: 16px;">
            <h3 id="results-title" style="margin-bottom: 1rem; font-size: 1.2rem; font-weight: 600;">Results</h3>
            <div id="results-content" style="color: #cbd5e1; font-family: 'Inter', sans-serif; overflow-x: auto;"></div>
        </div>
    </div>

        <div id="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center;">
            <div style="background: var(--card-bg); padding: 2rem; border-radius: 16px; border: 1px solid var(--primary-light); width: 400px; max-width: 90%;">
                <h3 id="modal-title" style="margin-bottom: 1rem;">Action</h3>
                <div id="modal-body"></div>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button class="btn" style="background: #475569;" onclick="document.getElementById('modal-overlay').style.display='none'">Cancel</button>
                    <button class="btn" id="modal-submit">Submit</button>
                </div>
            </div>
        </div>

    <script>
        // Modal & Action Logic
        function openModal(title, fields, onSubmit) {
            document.getElementById('modal-title').innerText = title;
            let bodyHtml = '';
            fields.forEach(f => {
                bodyHtml += `<div style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom: 0.3rem;">${f.label}</label>
                    <input type="text" id="input-${f.id}" style="width: 100%; padding: 0.5rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white;" placeholder="${f.label}">
                </div>`;
            });
            document.getElementById('modal-body').innerHTML = bodyHtml;
            
            document.getElementById('modal-submit').onclick = async () => {
                let data = {};
                fields.forEach(f => { data[f.id] = document.getElementById(`input-${f.id}`).value; });
                await onSubmit(data);
                document.getElementById('modal-overlay').style.display='none';
            };
            
            document.getElementById('modal-overlay').style.display='flex';
        }

        async function sendRest(url, method, data) {
            try {
                let res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: data ? JSON.stringify(data) : null
                });
                let result = await res.json();
                
                if (res.ok) {
                    alert(result.message || "Action successful!");
                    if (url.includes('students')) fetchStudents();
                    if (url.includes('employees')) fetchTeachers();
                } else {
                    alert(result.message || "An error occurred");
                }
            } catch (err) {
                alert("Failed to connect to the server.");
            }
        }


        function promptAddStudent() { openModal('Add Student', [{id:'sid', label:'Student ID'}, {id:'name', label:'Name'}, {id:'contact', label:'Contact'}, {id:'age', label:'Age'}], (data) => sendRest('/api/students', 'POST', data)); }
        function promptRemoveStudent() { openModal('Remove Student', [{id:'sid', label:'Student ID'}], (data) => sendRest(`/api/students/${data.sid}`, 'DELETE')); }
        function promptUpdateStudent() { openModal('Update Student', [{id:'sid', label:'Student ID'}, {id:'column', label:'Column (Name/Contact/Age)'}, {id:'new_value', label:'New Value'}], (data) => sendRest(`/api/students/${data.sid}`, 'PUT', data)); }

        function promptAddEmployee() { openModal('Add Employee', [{id:'emp_id', label:'Employee ID'}, {id:'name', label:'Name'}, {id:'contact', label:'Contact'}, {id:'position', label:'Position'}], (data) => sendRest('/api/employees', 'POST', data)); }
        function promptRemoveEmployee() { openModal('Remove Employee', [{id:'emp_id', label:'Employee ID'}], (data) => sendRest(`/api/employees/${data.emp_id}`, 'DELETE')); }
        function promptUpdateEmployee() { openModal('Update Employee', [{id:'emp_id', label:'Employee ID'}, {id:'column', label:'Column (Name/Contact/Position)'}, {id:'new_value', label:'New Value'}], (data) => sendRest(`/api/employees/${data.emp_id}`, 'PUT', data)); }

        function promptClassScheduling() { openModal('Class Scheduling', [{id:'teacher', label:'Teacher'}, {id:'classroom', label:'Classroom'}, {id:'course_id', label:'Course ID'}, {id:'course_name', label:'Course Name'}, {id:'lecture_time', label:'Lecture Time'}], (data) => sendRest('/api/academic/schedule', 'POST', data)); }

        // Fetch Functions (Original logic)
        // Fetch Students Function
        async function fetchStudents() {
            const container = document.getElementById('results-container');
            const title = document.getElementById('results-title');
            const content = document.getElementById('results-content');
            
            container.style.display = 'block';
            title.innerText = 'Loading students...';
            content.innerHTML = '<span style="color:var(--primary-light)">Fetching live data from python backend...</span>';
            
            try {
                let response = await fetch('/api/students');
                let data = await response.json();
                
                if(data.length === 0) {
                    content.innerText = "No students found in the database.";
                } else {
                    let tableHTML = `<table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                        <thead>
                            <tr style="border-bottom: 2px solid rgba(255,255,255,0.1); text-align: left; color: white;">
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Student ID</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Name</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Contact</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Age</th>
                            </tr>
                        </thead>
                        <tbody>`;
                    
                    data.forEach(item => {
                        tableHTML += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <td style="padding: 0.8rem 0.5rem;">${item.ID || ''}</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.Name || ''}</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.Contact || ''}</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.Age || ''}</td>
                        </tr>`;
                    });
                    tableHTML += `</tbody></table>`;
                    
                    title.innerText = '📚 Current Student Records';
                    content.innerHTML = tableHTML;
                }
            } catch (error) {
                title.innerText = 'Error';
                content.innerText = 'Failed to fetch data! Make sure your Python Flask app.py is running.';
            }
        }
        
        // Fetch Teachers Function
        async function fetchTeachers() {
            const container = document.getElementById('results-container');
            const title = document.getElementById('results-title');
            const content = document.getElementById('results-content');
            
            container.style.display = 'block';
            title.innerText = 'Loading employees...';
            content.innerHTML = '<span style="color:var(--primary-light)">Fetching live data from python backend...</span>';
            
            try {
                let response = await fetch('/api/employees');
                let data = await response.json();
                
                if(data.length === 0) {
                    content.innerText = "No employees found in the database.";
                } else {
                    let tableHTML = `<table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                        <thead>
                            <tr style="border-bottom: 2px solid rgba(255,255,255,0.1); text-align: left; color: white;">
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Employee ID</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Name</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Contact</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Position</th>
                            </tr>
                        </thead>
                        <tbody>`;
                    
                    data.forEach(item => {
                        tableHTML += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <td style="padding: 0.8rem 0.5rem;">${item.ID || ''}</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.Name || ''}</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.Contact || ''}</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.Position || ''}</td>
                        </tr>`;
                    });
                    tableHTML += `</tbody></table>`;
                    
                    title.innerText = '👨‍🏫 Active Employees & Teachers';
                    content.innerHTML = tableHTML;
                }
            } catch (error) {
                title.innerText = 'Error';
                content.innerText = 'Failed to fetch data! Make sure your Python Flask app.py is running.';
            }
        }
        
        // Fetch System Reports
        async function fetchReports() {
            const container = document.getElementById('results-container');
            const title = document.getElementById('results-title');
            const content = document.getElementById('results-content');
            
            container.style.display = 'block';
            title.innerText = 'Loading reports...';
            content.innerHTML = '<span style="color:var(--primary-light)">Fetching live data from python backend...</span>';
            
            try {
                let response = await fetch('/api/academic/attendance');
                let data = await response.json();
                
                if(data.length === 0) {
                    content.innerText = "No academic records found in the database.";
                } else {
                    let tableHTML = `<table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                        <thead>
                            <tr style="border-bottom: 2px solid rgba(255,255,255,0.1); text-align: left; color: white;">
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Student</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Course ID</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Attendance Rate</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Exam Status</th>
                            </tr>
                        </thead>
                        <tbody>`;
                    
                    data.forEach(item => {
                        let color = item.Status === 'OK' ? '#4ade80' : '#f87171';
                        tableHTML += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <td style="padding: 0.8rem 0.5rem;">${item.StudentName || ''} (${item.StudentID || ''})</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.CourseID || ''}</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.AttendanceRate.toFixed(2)}%</td>
                            <td style="padding: 0.8rem 0.5rem; color: ${color}; font-weight: bold;">${item.Status}</td>
                        </tr>`;
                    });
                    tableHTML += `</tbody></table>`;
                    
                    title.innerText = '📑 System Report - Student Attendance';
                    content.innerHTML = tableHTML;
                }
            } catch (error) {
                title.innerText = 'Error';
                content.innerText = 'Failed to fetch data! Make sure your Python Flask app.py is running.';
            }
        }
        // Fetch Stats
        async function fetchStats() {
            const container = document.getElementById('results-container');
            const title = document.getElementById('results-title');
            const content = document.getElementById('results-content');
            
            container.style.display = 'block';
            title.innerText = 'Calculating stats...';
            content.innerHTML = '<span style="color:var(--primary-light)">Fetching statistical insights from python backend...</span>';
            
            try {
                let response = await fetch('/api/academic/stats');
                let data = await response.json();
                
                if(Object.keys(data).length === 0) {
                    content.innerText = "No academic records found to analyze.";
                } else {
                    let html = `<div style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem;">`;
                    for (const [key, stats] of Object.entries(data)) {
                        html += `<div style="background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 12px; border-left: 4px solid var(--primary); flex: 1; min-width: 200px;">
                            <h4 style="margin-bottom: 0.8rem; color: white; font-size: 1.1rem;">${key}</h4>
                            <p style="margin: 0.5rem 0;"><strong>Average:</strong> ${stats.Average.toFixed(2)}</p>
                            <p style="margin: 0.5rem 0;"><strong>Std Dev:</strong> ${stats.StdDev.toFixed(2)}</p>
                            <p style="margin: 0.5rem 0;"><strong>Min:</strong> ${stats.Min} | <strong>Max:</strong> ${stats.Max}</p>
                        </div>`;
                    }
                    html += `</div>`;
                    
                    title.innerText = '📈 Statistical Insights';
                    content.innerHTML = html;
                }
            } catch (error) {
                title.innerText = 'Error';
                content.innerText = 'Failed to fetch data! Make sure your Python Flask app.py is running.';
            }
        }
    </script>
</body>
</html>
