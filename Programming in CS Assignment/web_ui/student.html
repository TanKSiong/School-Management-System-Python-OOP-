<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - EduCore</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .portal-container { max-width: 900px; background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 24px; padding: 2.5rem; margin: 2rem auto; width: 90%; position: relative; z-index: 1; animation: fadeInUp 0.8s ease-out forwards; }
        .portal-header { margin-bottom: 2.5rem; text-align: left; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .portal-header-left { display: flex; align-items: center; gap: 1rem; }
        .portal-header .icon { width: 65px; height: 65px; font-size: 2.2rem; margin: 0; background: rgba(99, 102, 241, 0.2); border-color: rgba(99, 102, 241, 0.5); transform: none !important; }
        .portal-header h1 { font-size: 2.2rem; background: none; -webkit-text-fill-color: var(--text-color); margin: 0; }
        .back-link { color: var(--primary-light); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem; transition: transform 0.2s; }
        .back-link:hover { transform: translateX(-5px); }
        .grid-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        @media (max-width: 768px) { .grid-cards { grid-template-columns: 1fr; } }
        .task-card { background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); transition: background 0.3s, transform 0.3s; }
        .task-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-5px); }
        .task-card h3 { margin-bottom: 0.8rem; font-size: 1.2rem; font-weight: 600; }
        .task-card p { color: #cbd5e1; font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.5; }
        .btn { display: inline-block; padding: 0.8rem 1.5rem; background: var(--primary); border: none; border-radius: 12px; color: white; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: background 0.3s, transform 0.2s; text-decoration: none; }
        .btn:hover { background: var(--primary-light); transform: scale(1.05); }
        
        /* Specific accent for student */
        .portal-header .icon {
            background: rgba(192, 38, 211, 0.2);
            border-color: rgba(192, 38, 211, 0.5);
        }
        .btn {
            background: #a21caf;
        }
        .btn:hover {
            background: #d946ef;
        }
    </style>
</head>
<body>
    <div class="background" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="portal-container">
        <header class="portal-header">
            <div class="portal-header-left">
                <div class="icon">📚</div>
                <h1>Student Portal</h1>
            </div>
            <a href="index.html" class="back-link">← Back to Dashboard</a>
        </header>

        <div class="grid-cards">
            <div class="task-card" style="grid-column: 1 / -1;">
                <h3>📊 My Attendance & Performance</h3>
                <p>Enter your Student ID to view your records, attendance logs, and exam eligibility.</p>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.5rem;">
                    <button class="btn" onclick="promptStudentReport()">View My Report</button>
                    <button class="btn" onclick="fetchSchedule()">View Schedule</button>
                </div>
            </div>
        </div>
        
        <!-- Interactive Code for Python Flask Integration -->
        <div id="results-container" style="margin-top: 2rem; display: none; background: rgba(0,0,0,0.25); padding: 1.5rem; border-radius: 16px;">
            <h3 id="results-title" style="margin-bottom: 1rem; font-size: 1.2rem; font-weight: 600;">Results</h3>
            <div id="results-content" style="color: #cbd5e1; font-family: 'Inter', sans-serif; overflow-x: auto;"></div>
        </div>
    </div>
    
    <div id="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: var(--card-bg); padding: 2rem; border-radius: 16px; border: 1px solid var(--primary-light); width: 400px; max-width: 90%;">
            <h3 id="modal-title" style="margin-bottom: 1rem;">Action</h3>
            <div id="modal-body"></div>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button class="btn" style="background: #475569;" onclick="document.getElementById('modal-overlay').style.display='none'">Cancel</button>
                <button class="btn" id="modal-submit">Submit</button>
            </div>
        </div>
    </div>

    <script>
        // Modal Logic
        function openModal(title, fields, onSubmit) {
            document.getElementById('modal-title').innerText = title;
            let bodyHtml = '';
            fields.forEach(f => {
                bodyHtml += `<div style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom: 0.3rem;">${f.label}</label>
                    <input type="text" id="input-${f.id}" style="width: 100%; padding: 0.5rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white;" placeholder="${f.label}">
                </div>`;
            });
            document.getElementById('modal-body').innerHTML = bodyHtml;
            
            document.getElementById('modal-submit').onclick = async () => {
                let data = {};
                fields.forEach(f => { data[f.id] = document.getElementById(`input-${f.id}`).value; });
                await onSubmit(data);
                document.getElementById('modal-overlay').style.display='none';
            };
            
            document.getElementById('modal-overlay').style.display='flex';
        }

        function promptStudentReport() {
            openModal('Enter Student ID', [{id:'sid', label:'Student ID'}], (data) => fetchGrades(data.sid));
        }

        async function fetchGrades(sid) {
            const container = document.getElementById('results-container');
            const title = document.getElementById('results-title');
            const content = document.getElementById('results-content');
            
            container.style.display = 'block';
            title.innerText = 'Loading academic records...';
            content.innerHTML = '<span style="color:var(--primary-light)">Fetching live records from python...</span>';
            
            try {
                let response = await fetch(`/api/academic/report/student/${sid}`);
                let data = await response.json();
                
                if (data.error) {
                    title.innerText = 'Server Error';
                    content.innerText = data.error;
                } else if(data.length === 0) {
                    content.innerText = "No academic records found for this ID.";
                } else {
                    let tableHTML = `<table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                        <thead>
                            <tr style="border-bottom: 2px solid rgba(255,255,255,0.1); text-align: left; color: white;">
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Course</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Attendance Rate</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Exam Status</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Total Score</th>
                            </tr>
                        </thead>
                        <tbody>`;
                    
                    data.forEach(item => {
                        let statusColor = item.ExamStatus === 'Allowed' ? '#4ade80' : '#f87171';
                        tableHTML += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <td style="padding: 0.8rem 0.5rem;">${item.CourseID || ''}</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.AttendanceRate.toFixed(2)}%</td>
                            <td style="padding: 0.8rem 0.5rem; color: ${statusColor}; font-weight: bold;">${item.ExamStatus}</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.TotalScore}</td>
                        </tr>`;
                    });
                    tableHTML += `</tbody></table>`;
                    
                    title.innerText = `🎓 My Performance Report - ${data[0].StudentName || sid}`;
                    content.innerHTML = tableHTML;
                }
            } catch (error) {
                title.innerText = 'Error';
                content.innerText = 'Failed to fetch data! Ensure python app.py is running.';
            }
        }
        
        async function fetchSchedule() {
            const container = document.getElementById('results-container');
            const title = document.getElementById('results-title');
            const content = document.getElementById('results-content');
            
            container.style.display = 'block';
            title.innerText = 'Loading schedule...';
            content.innerHTML = '<span style="color:var(--primary-light)">Fetching live schedule...</span>';
            
            try {
                let response = await fetch('/api/academic/schedule');
                let data = await response.json();
                
                if(data.length === 0) {
                    content.innerText = "No schedule found.";
                } else {
                    let tableHTML = `<table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                        <thead>
                            <tr style="border-bottom: 2px solid rgba(255,255,255,0.1); text-align: left; color: white;">
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Course</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Room</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Time</th>
                                <th style="padding: 0.8rem 0.5rem; font-weight: 600;">Lecturer</th>
                            </tr>
                        </thead>
                        <tbody>`;
                    
                    data.forEach(item => {
                        tableHTML += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <td style="padding: 0.8rem 0.5rem;">${item.CourseName || ''}</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.Classroom || ''}</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.LectureTime || ''}</td>
                            <td style="padding: 0.8rem 0.5rem;">${item.Teacher || ''}</td>
                        </tr>`;
                    });
                    tableHTML += `</tbody></table>`;
                    
                    title.innerText = '📅 My Schedule';
                    content.innerHTML = tableHTML;
                }
            } catch (error) {
                title.innerText = 'Error';
                content.innerText = 'Failed to fetch data! Ensure python app.py is running.';
            }
        }
        
        async function fetchAssignments() {
            const container = document.getElementById('results-container');
            const title = document.getElementById('results-title');
            const content = document.getElementById('results-content');
            
            container.style.display = 'block';
            title.innerText = 'Assignments';
            content.innerHTML = 'You have no pending assignments right now. Enjoy your day! 🌞';
        }
    </script>
</body>
</html>
